<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomized Void</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            pointer-events: none;
            /* Use CSS variables for random math */
            transform: translate(0, 0) rotate(var(--angle));
            opacity: 0;
            animation: shoot var(--speed) linear forwards;
        }

        @keyframes shoot {
            0% { 
                transform: translate(0, 0) rotate(var(--angle)) scaleX(0); 
                opacity: 1; 
            }
            100% { 
                /* Moves the star 1000px forward based on its own rotation */
                transform: translate(var(--translateX), var(--translateY)) rotate(var(--angle)) scaleX(1.5); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <script>
        function createStars() {
            const starCount = 150;
            const body = document.body;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;

                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.opacity = Math.random();

                body.appendChild(star);
            }
        }

        function spawnShootingStar() {
            const shooter = document.createElement('div');
            shooter.className = 'shooting-star';

            // 1. Random Start Position
            shooter.style.top = Math.random() * 100 + 'vh';
            shooter.style.left = Math.random() * 100 + 'vw';

            // 2. Random Angle (0 to 360 degrees)
            const angle = Math.random() * 360;
            
            // 3. Random Speed (0.5s to 2s)
            const speed = (Math.random() * 1.5 + 0.5) + 's';

            // 4. Random Distance (how far it travels)
            const distance = Math.random() * 400 + 400; // 400px to 800px
            
            // Calculate X and Y based on the angle
            const tx = Math.cos(angle * Math.PI / 180) * distance;
            const ty = Math.sin(angle * Math.PI / 180) * distance;

            // Set variables for CSS to use
            shooter.style.setProperty('--angle', `${angle}deg`);
            shooter.style.setProperty('--translateX', `${tx}px`);
            shooter.style.setProperty('--translateY', `${ty}px`);
            shooter.style.setProperty('--speed', speed);
            shooter.style.width = (Math.random() * 100 + 100) + 'px';

            document.body.appendChild(shooter);

            // Cleanup
            setTimeout(() => shooter.remove(), 2000);
        }

        // Initialize background stars
        createStars();

        // Spawn shooting stars randomly
        setInterval(() => {
            if(Math.random() > 0.6) spawnShootingStar();
        }, 2000);
    </script>
</body>
</html>
