<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Monochrome</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Pure black */
            color: white;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .content {
            z-index: 10;
            text-align: center;
            letter-spacing: 3px;
        }

        /* Standard Star */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Galaxy Cluster Star */
        .galaxy-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px); /* Creates the "cloudy" galaxy look */
            opacity: 0.4;
        }

        /* High-Visibility Shooting Star */
        .shooting-star {
            position: absolute;
            height: 3px; /* Thicker */
            background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            transform: rotate(-35deg);
            pointer-events: none;
            filter: drop-shadow(0 0 5px white); /* Makes it pop */
            animation: shoot 1.5s ease-out forwards;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-35deg) scaleX(0); opacity: 1; }
            50% { transform: translateX(-400px) translateY(280px) rotate(-35deg) scaleX(1.5); opacity: 1; }
            100% { transform: translateX(-800px) translateY(560px) rotate(-35deg) scaleX(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>VOID</h1>
    </div>

    <script>
        const body = document.body;

        function initSpace() {
            // 1. Generate standard background stars
            for (let i = 0; i < 150; i++) {
                createStar('star', Math.random() * 2);
            }

            // 2. Generate 3 "Galaxies" (clusters)
            for (let g = 0; g < 3; g++) {
                createGalaxy();
            }
        }

        function createStar(className, maxSize) {
            const star = document.createElement('div');
            star.className = className;
            const size = Math.random() * maxSize + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.opacity = Math.random();
            body.appendChild(star);
            return star;
        }

        function createGalaxy() {
            // Pick a center point for the galaxy
            const centerX = Math.random() * 100;
            const centerY = Math.random() * 100;
            
            // Create 40 stars packed closely to the center
            for (let i = 0; i < 40; i++) {
                const star = document.createElement('div');
                star.className = 'galaxy-star';
                
                // Randomize position around the center point
                const offset = 10; 
                star.style.top = (centerY + (Math.random() * offset - offset/2)) + 'vh';
                star.style.left = (centerX + (Math.random() * offset - offset/2)) + 'vw';
                
                const size = Math.random() * 2 + 'px';
                star.style.width = size;
                star.style.height = size;
                
                body.appendChild(star);
            }
        }

        function spawnShootingStar() {
            const shooter = document.createElement('div');
            shooter.className = 'shooting-star';
            
            shooter.style.top = Math.random() * 40 + 'vh';
            shooter.style.left = (Math.random() * 40 + 60) + 'vw';
            shooter.style.width = (Math.random() * 150 + 100) + 'px'; // Longer tail

            body.appendChild(shooter);
            setTimeout(() => shooter.remove(), 1500);
        }

        initSpace();

        // Shooting stars every 3-7 seconds
        (function loop() {
            const rand = Math.random() * 4000 + 3000;
            setTimeout(() => {
                spawnShootingStar();
                loop();
            }, rand);
        }());
    </script>
</body>
</html>
