<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Skies</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .content {
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* The Diamond Star Shape */
        .star {
            position: absolute;
            background: white;
            transform: rotate(45deg); /* Rotates square to diamond */
            pointer-events: none;
        }

        /* Special Glowing Stars */
        .glow {
            filter: drop-shadow(0 0 4px currentColor);
            opacity: 1 !important; /* Make sure they are bright */
        }

        /* Shooting Star */
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            transform: rotate(-35deg);
            pointer-events: none;
            animation: shoot 2s linear forwards;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-35deg) scaleX(0); opacity: 1; }
            100% { transform: translateX(-1000px) translateY(700px) rotate(-35deg) scaleX(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>DIAMOND VOID</h1>
        <p>Monochrome base with rare stellar glows.</p>
    </div>

    <script>
        function createStars() {
            const starCount = 150;
            const body = document.body;
            // A few rare colors
            const rareColors = ['#00f2ff', '#ff007b', '#beff00', '#7000ff'];

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random size (2px to 5px looks better for diamonds)
                const sizeValue = Math.random() * 3 + 2;
                const size = sizeValue + 'px';
                star.style.width = size;
                star.style.height = size;

                // Random position
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';

                // Random slight opacity for depth
                star.style.opacity = Math.random();

                // Logic for "A FEW" colored glowing stars (approx 5% chance)
                if (Math.random() > 0.95) {
                    const color = rareColors[Math.floor(Math.random() * rareColors.length)];
                    star.classList.add('glow');
                    star.style.backgroundColor = color;
                    star.style.color = color; // Used by currentColor in CSS
                }

                body.appendChild(star);
            }
        }

        function spawnShootingStar() {
            const shooter = document.createElement('div');
            shooter.className = 'shooting-star';
            shooter.style.top = Math.random() * 50 + 'vh';
            shooter.style.left = (Math.random() * 50 + 50) + 'vw';
            shooter.style.width = (Math.random() * 100 + 150) + 'px';
            document.body.appendChild(shooter);
            setTimeout(() => shooter.remove(), 2000);
        }

        // Initialize
        createStars();
        
        // Occasional shooting stars
        setInterval(() => {
            if(Math.random() > 0.7) spawnShootingStar();
        }, 3000);
    </script>
</body>
</html>
